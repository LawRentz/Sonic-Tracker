<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sonic Tracker</title>

<style>
  html,body{
    margin:0;
    height:100%;
    background:#000;
    overflow:hidden;
  }

  canvas{
    display:block;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
</head>

<body>

<script>

let cam, prevFrame, diffImg, haloLayer;
let threshold = 20;
let blobs = [];
let prevPos = new Map();

function setup(){

  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  frameRate(60);
  colorMode(HSB, 360, 100, 100, 100);

  cam = createCapture({
    video: {
      facingMode: {
        ideal: "environment"
      }
    },
    audio: false
  });

  cam.size(320,240);
  cam.hide();

  prevFrame = createImage(cam.width, cam.height);
  diffImg   = createImage(cam.width, cam.height);

  haloLayer = createGraphics(width, height);
  haloLayer.colorMode(HSB, 360, 100, 100, 100);
  haloLayer.clear();

  textFont('monospace');
  textStyle(BOLD);
}

function draw(){

  background(0);
  blobs = [];

  cam.loadPixels();
  prevFrame.loadPixels();

  if(cam.pixels.length > 0 && prevFrame.pixels.length > 0){

    diffImg.loadPixels();

    for(let i = 0; i < cam.pixels.length; i += 4){

      let d = dist(
        cam.pixels[i],
        cam.pixels[i+1],
        cam.pixels[i+2],
        prevFrame.pixels[i],
        prevFrame.pixels[i+1],
        prevFrame.pixels[i+2]
      );

      let v = d > threshold ? 255 : 0;

      diffImg.pixels[i]   = v;
      diffImg.pixels[i+1] = v;
      diffImg.pixels[i+2] = v;
      diffImg.pixels[i+3] = 255;
    }

    diffImg.updatePixels();

    image(cam, 0, 0, width, height);

    blobs = findBlobs(diffImg, cam.width, cam.height);

    // LESS MOTION BLUR: higher alpha clears trails faster
    haloLayer.fill(0,0,0,38);
    haloLayer.noStroke();
    haloLayer.rect(0,0,width,height);

    let t = millis()/1000;
    let pulse = (sin(t * 1.2) + 1) / 2;

    let centers = [];

    for(let b of blobs){

      let cx = map((b.minX + b.maxX)/2, 0, cam.width, 0, width);
      let cy = map((b.minY + b.maxY)/2, 0, cam.height, 0, height);

      centers.push({x:cx, y:cy});

      let key = `${int(cx)}:${int(cy)}`;
      let prev = prevPos.get(key) || createVector(cx,cy);
      let sp = dist(prev.x, prev.y, cx, cy);
      prevPos.set(key, createVector(cx,cy));

      let hueVal = (200 + sin(t * 0.4 + b.minX * 0.08) * 50) % 360;

      let size = map(b.count, 200, 3000, 120, 260);

      drawHalo(haloLayer, cx, cy, size, hueVal, pulse, sp);
    }

    blendMode(ADD);
    image(haloLayer,0,0);
    blendMode(BLEND);

    drawConnectorLines(centers);
    drawTrackers();

    prevFrame.copy(
      cam,
      0,
      0,
      cam.width,
      cam.height,
      0,
      0,
      cam.width,
      cam.height
    );
  }
}

function drawConnectorLines(centers){

  if(centers.length < 2) return;

  stroke(180, 40, 100, 75);
  strokeWeight(2);
  noFill();

  for(let i = 0; i < centers.length - 1; i++){
    line(
      centers[i].x,
      centers[i].y,
      centers[i+1].x,
      centers[i+1].y
    );
  }
}

function drawHalo(layer, x, y, r, hueVal, pulse, spd){

  layer.push();
  layer.translate(x,y);
  layer.noFill();

  for(let i = 0; i < 3; i++){

    let alpha = map(i,0,2,55,14);

    layer.stroke(hueVal,80,100,alpha);
    layer.strokeWeight(map(i,0,2,16,4));

    layer.beginShape();

    for(let a = 0; a < TWO_PI; a += PI/70){

      let sx = cos(a) * r * (1 + 0.018 * pulse);
      let sy = sin(a) * r * (1 + 0.018 * pulse);

      layer.vertex(sx,sy);
    }

    layer.endShape(CLOSE);

    r *= 0.87;
  }

  layer.pop();
}

function drawTrackers(){

  for(let b of blobs){

    let cx = map((b.minX + b.maxX)/2, 0, cam.width, 0, width);
    let cy = map((b.minY + b.maxY)/2, 0, cam.height, 0, height);

    let side = map(b.count, 200, 3000, 100, 230);
    let half = side/2;

    stroke(0,0,100,95);
    strokeWeight(2.5);
    noFill();

    rect(cx-half, cy-half, side, side, 10);

    // MORE VISIBLE COORDINATES
    let label = `(${int(cx)}, ${int(cy)})`;

    textAlign(CENTER);
    textSize(24);
    textStyle(BOLD);

    // black outline/shadow
    fill(0,0,0,90);
    noStroke();
    text(label, cx + 2, cy - half - 18 + 2);

    // white main text
    fill(0,0,100,100);
    text(label, cx, cy - half - 18);
  }
}

function findBlobs(img, w, h){

  let visited = new Uint8Array(w * h);
  img.loadPixels();

  let found = [];

  for(let y = 0; y < h; y++){

    for(let x = 0; x < w; x++){

      let idx = x + y * w;
      let p = img.pixels[idx * 4];

      if(p > 128 && !visited[idx]){

        let b = flood(x, y, visited, img, w, h);

        if(b.count > 200){
          found.push(b);
        }
      }
    }
  }

  return found;
}

function flood(x, y, vis, img, w, h){

  let st = [[x,y]];

  let minX = x;
  let maxX = x;
  let minY = y;
  let maxY = y;
  let c = 0;

  while(st.length){

    let [cx,cy] = st.pop();

    if(cx < 0 || cy < 0 || cx >= w || cy >= h) continue;

    let idx = cx + cy * w;

    if(vis[idx]) continue;

    let p = idx * 4;

    if(img.pixels[p] <= 128) continue;

    vis[idx] = 1;
    c++;

    minX = min(minX,cx);
    maxX = max(maxX,cx);
    minY = min(minY,cy);
    maxY = max(maxY,cy);

    st.push(
      [cx+1,cy],
      [cx-1,cy],
      [cx,cy+1],
      [cx,cy-1]
    );
  }

  return {minX,maxX,minY,maxY,count:c};
}

function windowResized(){

  resizeCanvas(windowWidth, windowHeight);

  haloLayer = createGraphics(width, height);
  haloLayer.colorMode(HSB, 360, 100, 100, 100);
  haloLayer.clear();
}

</script>

</body>
</html>
